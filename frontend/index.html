<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea 3 - Azure | Seminario de Sistemas 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white shadow-2xl rounded-2xl p-8 max-w-xl w-full border border-slate-100">
        
        <div class="mb-8 border-b border-slate-200 pb-6 text-center">
            <h2 class="text-3xl font-extrabold text-blue-900 tracking-tight mb-2">Enner Esaí Mendizabal Castro</h2>
            <h3 class="text-lg font-medium text-slate-500 bg-slate-100 inline-block px-4 py-1 rounded-full">Carnet: 202302220</h3>
        </div>
        
        <div class="flex justify-center mb-8">
            <button onclick="obtenerDatos('http://9.205.155.126/get-data')" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl shadow-sm transition-all duration-200 focus:ring-4 focus:ring-blue-100 active:scale-95 text-lg">
                Llamar al Balanceador de Carga
            </button>
        </div>

        <div>
            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Respuesta del Servidor:</h4>
            <div class="relative shadow-lg rounded-xl overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-8 bg-slate-800 flex items-center px-4 gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <pre id="json-resultado" class="bg-slate-900 text-slate-400 p-5 pt-12 overflow-x-auto font-mono text-sm min-h-[160px] m-0">Esperando solicitud...</pre>
            </div>
        </div>
    </div>

    <script>
        async function obtenerDatos(url) {
            const contenedor = document.getElementById('json-resultado');
            contenedor.style.color = "#94a3b8"; 
            contenedor.textContent = "Consultando al balanceador...";
            
            try {
                const respuesta = await fetch(url);
                if (!respuesta.ok) throw new Error("Error HTTP: " + respuesta.status);
                
                const datos = await respuesta.json();
                contenedor.style.color = "#4ade80"; 
                contenedor.textContent = JSON.stringify(datos, null, 4);
                
            } catch (error) {
                contenedor.style.color = "#f87171"; 
                contenedor.textContent = "Error al conectar con el balanceador:\n" + error.message;
            }
        }
    </script>
</body>
</html>
